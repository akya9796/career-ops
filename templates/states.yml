# AI Job Application Assistant - Canonical States

states:
  - id: scored_needs_human_review
    label: Scored - Needs Human Review
    description: Job has been scored and requires a human decision before applying.

  - id: documents_generated
    label: Documents Generated
    description: Tailored CV, cover letter, or interview prep files have been generated.

  - id: ready_to_apply
    label: Ready To Apply
    description: Human reviewed the generated materials and marked the application ready.

  - id: applied
    label: Applied
    description: Application was manually submitted by the user.

  - id: interview
    label: Interview
    description: Interview process is active.

  - id: rejected
    label: Rejected
    description: Application was rejected or closed.

  - id: skip
    label: Skip
    description: User decided not to apply.

